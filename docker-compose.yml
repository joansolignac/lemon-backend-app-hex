services:
  postgres:
    image: postgres:16-alpine
    container_name: lemon-app-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "lemon_app_db"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/database-init/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: